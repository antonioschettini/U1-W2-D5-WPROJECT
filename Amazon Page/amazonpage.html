<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Benvenuti su Amazon!</title>
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <link rel="stylesheet" href="./assets/css/normalize-antonio.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <header>
      <img class="img-logo" src="./assets/images/logo.png" alt="Logo.Amazon" />
    </header>
    <nav>
      <span>All </span><span>Todays's Deals </span><span>Customer Service</span
      ><span>Registry </span><span>Gift Card </span><span>Sell </span>
    </nav>
    <main>
      <div class="orange-bar">
        <p>Shop All Holiday Gift Cards</p>
      </div>
      <div class="primo-blocco">
        <h1>Holiday Gift Guides</h1>
        <p>Be a gogo-gifter</p>
        <br />
      </div>
      <div class="secondo-blocco">
        <p>
          Find the perfect gift
          <span class="blue"><strong>Shop Now</strong></span>
        </p>
        <div class="contenitore-griglia">
          <div class="box-immagine">
            <img src="./assets/images/img_1.jpg" alt="Tablet" />
          </div>
          <div class="box-immagine">
            <img src="./assets/images/img_2.jpg" alt="Laptop" />
          </div>
          <div class="box-immagine">
            <img src="./assets/images/img_3.jpg" alt="Smartwatch" />
          </div>
          <div class="box-immagine">
            <img src="./assets/images/img_4.jpg" alt="Cane-gatto" />
          </div>
        </div>
      </div>
      <div class="terzo-blocco">
        <img src="./assets/images/img_9.png" alt="Console" />
        <p>
          Play the gifting game
          <span class="blue"><strong>Shop Gaming</strong></span>
        </p>
      </div>
      <div class="quarto-blocco">
        <img src="./assets/images/img_10.png" alt="Casse-Marshall" />
        <p>
          The sound of cheer
          <span class="blue"><strong>Shop Audio & Accessories</strong></span>
        </p>
      </div>
    </main>
    <section class="footer-bar">
      <p class="footer-bar-p">Back to Top</p>
    </section>
    <footer>
      <img class="footer-logo" src="./assets/images/logo.png" alt="" />
    </footer>
  </body>
</html>
